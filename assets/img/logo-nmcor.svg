<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="32" fill="#e8e4d4"/>
  <!-- Cup body -->
  <path d="M50 95v30c0 22 18 40 40 40h20c22 0 40-18 40-40V95Z" fill="#5b8fa8" opacity="0.9"/>
  <!-- Cup rim -->
  <rect x="45" y="88" width="110" height="12" rx="6" fill="#4a7a91"/>
  <!-- Cup handle -->
  <path d="M150 100h8c8 0 14 6 14 14v4c0 8-6 14-14 14h-8" stroke="#4a7a91" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Book pages (inside cup) -->
  <path d="M75 96v38l25-8 25 8V96Z" fill="#f0ebd8" opacity="0.9"/>
  <line x1="100" y1="96" x2="100" y2="126" stroke="#4a7a91" stroke-width="1.5" opacity="0.4"/>
  <!-- Book lines -->
  <line x1="82" y1="106" x2="96" y2="106" stroke="#4a7a91" stroke-width="1.5" opacity="0.3"/>
  <line x1="82" y1="112" x2="94" y2="112" stroke="#4a7a91" stroke-width="1.5" opacity="0.3"/>
  <line x1="82" y1="118" x2="92" y2="118" stroke="#4a7a91" stroke-width="1.5" opacity="0.3"/>
  <line x1="104" y1="106" x2="118" y2="106" stroke="#4a7a91" stroke-width="1.5" opacity="0.3"/>
  <line x1="104" y1="112" x2="116" y2="112" stroke="#4a7a91" stroke-width="1.5" opacity="0.3"/>
  <line x1="104" y1="118" x2="114" y2="118" stroke="#4a7a91" stroke-width="1.5" opacity="0.3"/>
  <!-- Audio/signal waves above cup -->
  <path d="M90 82c0-8 4-14 10-14s10 6 10 14" stroke="#4a7a91" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M82 76c0-14 8-24 18-24s18 10 18 24" stroke="#4a7a91" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M75 70c0-18 11-32 25-32s25 14 25 32" stroke="#4a7a91" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Saucer -->
  <ellipse cx="100" cy="170" rx="52" ry="8" fill="#4a7a91" opacity="0.25"/>
  <!-- Text -->
  <text x="100" y="190" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#3a6a80" letter-spacing="0.1em">PODCAST</text>
</svg>